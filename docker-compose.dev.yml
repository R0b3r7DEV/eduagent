version: "3.9"

# ── Development overrides ─────────────────────────────────────────────────────
#
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# This file overrides the base compose for local development:
#   • Hot-reload on backend and frontend via volume mounts
#   • pgAdmin UI at http://localhost:5050
#   • Forces ENVIRONMENT=development so server API key fallback is active
#
# To use cloud services (Supabase + Upstash) instead of local containers,
# set the corresponding vars in .env:
#   DATABASE_URL=postgresql+asyncpg://postgres.[ref]:[pass]@db.[ref].supabase.co:5432/postgres
#   REDIS_URL=rediss://default:[pass]@[host]:[port]

services:
  backend:
    build:
      target: development
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      target: development
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eduagent.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - eduagent
